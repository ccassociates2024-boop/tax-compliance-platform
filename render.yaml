services:
  - type: web
    name: taxcompliance-demo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.demo.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEMO_MODE
        value: "true"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./demo.db
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CELERY_BROKER_URL
        value: redis://localhost:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://localhost:6379/2
      - key: SECRET_KEY
        generateValue: true
      - key: VAULT_MASTER_KEY
        generateValue: true
      - key: VAULT_SALT
        value: taxcompliance-demo-salt-2025
      # sync: false on these means Render leaves whatever you set manually in
      # the dashboard alone — git pushes won't ever overwrite/wipe these keys.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: DEMO_USER_EMAIL
        value: demo@taxcomplianceai.in
      - key: DEMO_USER_PASSWORD
        value: demo123

  - type: web
    name: taxcompliance-demo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_DEMO_MODE
        value: "true"
      # sync: false — Render assigns the actual backend URL at deploy time
      # (it may get a random suffix if the exact name is taken), so this is
      # set once manually in the dashboard rather than tracked here. This
      # also means a future `git push` can never silently revert it back to
      # a wrong/placeholder value.
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
