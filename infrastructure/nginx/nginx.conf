events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:80; }

    # ── HTTP → HTTPS redirect (production) ───────────────────────────────────
    # Uncomment in production when SSL is configured
    # server {
    #     listen 80;
    #     server_name taxcomplianceai.in api.taxcomplianceai.in;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server (HTTP for local / dev) ────────────────────────────────────
    server {
        listen 80;
        server_name localhost taxcomplianceai.in;

        # API proxy
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # SSE streaming (AI responses)
            proxy_buffering    off;
            proxy_cache        off;
        }

        # Frontend (React SPA)
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
