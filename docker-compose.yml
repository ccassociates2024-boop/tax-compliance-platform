version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taxcompliance-db
    environment:
      POSTGRES_DB: taxcompliance
      POSTGRES_USER: taxadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxadmin -d taxcompliance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (sessions + Celery broker) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taxcompliance-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxcompliance-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://taxadmin:${DB_PASSWORD}@db:5432/taxcompliance
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - playwright-browsers:/root/.cache/ms-playwright
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker (background tasks: portal fetches) ────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxcompliance-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://taxadmin:${DB_PASSWORD}@db:5432/taxcompliance
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      - backend
    volumes:
      - ./backend:/app
      - playwright-browsers:/root/.cache/ms-playwright
    command: celery -A tasks worker --loglevel=info --concurrency=4

  # ─── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taxcompliance-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: taxcompliance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  playwright-browsers:
